<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLS Studio | Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f172a; color: #f8fafc; overflow: hidden; }
        .container { background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); width: 100%; max-width: 800px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; margin-bottom: 12px; outline: none; }
        
        .btn-primary { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary:hover { background: #7dd3fc; transform: translateY(-2px); }
        
        .btn-secondary { background: transparent; color: #38bdf8; border: 1px solid #38bdf8; margin-top: 10px; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .birthday-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .birthday-row select { margin-bottom: 0; }

        .screen { display: none; }
        .active-screen { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th { color: #94a3b8; font-size: 0.75rem; padding: 10px; border-bottom: 1px solid #334155; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        
        .role-badge { padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; border: none; }
        .owner-bg { background: #38bdf8; color: #0f172a; }
        .dev-bg { background: #0ea5e9; color: white; }
        .admin-bg { background: #a855f7; color: white; }
        .tester-bg { background: #10b981; color: white; }
        .user-bg { background: #64748b; color: white; }
        
        .badge-clickable { cursor: pointer; transition: 0.2s; }
        .badge-clickable:hover { filter: brightness(1.2); }

        .community-btn { background: #ffffff; color: #000000; margin: 25px auto 0; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; max-width: 350px; font-size: 0.9rem; border-radius: 8px; font-weight: bold; padding: 12px; transition: 0.2s; }
        .community-btn:hover { background: #f1f5f9; transform: scale(1.02); }
        
        .logout-btn { background: transparent; color: #94a3b8; text-decoration: underline; margin-top: 15px; font-size: 0.8rem; cursor: pointer; border: none; }
        
        .action-cell { display: flex; gap: 5px; }
        .ban-btn { padding: 5px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.7rem; color: white; font-weight: bold; min-width: 55px; }
        .remove-btn { padding: 5px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.7rem; color: white; font-weight: bold; background: #475569; }
        .remove-btn:hover { background: #ef4444; }

        .status-active { color: #4ade80; }
        .status-banned { color: #ef4444; text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen" class="screen active-screen">
            <h2 style="margin-bottom: 25px;">NLS STUDIO</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button class="btn-primary" onclick="handleLogin()">Sign In</button>
            <button class="btn-secondary" onclick="showScreen('signup-screen')">Create New Account</button>
        </div>

        <div id="signup-screen" class="screen">
            <h2 style="margin-bottom: 15px;">NLS Account Sign Up</h2>
            <div class="birthday-row">
                <select id="birth-day"></select>
                <select id="birth-month">
                    <option value="Jan">Jan</option><option value="Feb">Feb</option><option value="Mar">Mar</option>
                    <option value="Apr">Apr</option><option value="May">May</option><option value="Jun">Jun</option>
                    <option value="Jul">Jul</option><option value="Aug">Aug</option><option value="Sep">Sep</option>
                    <option value="Oct">Oct</option><option value="Nov">Nov</option><option value="Dec">Dec</option>
                </select>
                <select id="birth-year"></select>
            </div>
            <input type="text" id="reg-username" placeholder="Username">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Password">
            <button class="btn-primary" onclick="handleSignUp()">Sign Up</button>
            <button class="logout-btn" onclick="showScreen('login-screen')">Back to Login</button>
        </div>

        <div id="dashboard" class="screen">
            <h2 id="welcome-msg">Welcome</h2>
            <p id="user-display" style="margin-top: 5px; margin-bottom: 20px;"></p>
            
            <div id="staff-panel" style="display:none; background: #1e293b; padding: 15px; border-radius: 12px; margin-top: 10px; overflow-x: auto;">
                <p style="font-size: 0.7rem; color: #94a3b8; text-align: left; margin-bottom: 10px;" id="panel-hint"></p>
                <table>
                    <thead>
                        <tr><th>User</th><th>Rank</th><th id="pass-header" style="display:none;">Password</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="user-list"></tbody>
                </table>
            </div>
            
            <button id="main-action-btn" class="community-btn" onclick="window.location.href='https://www.roblox.com/communities/34495526/NLS-Studios#!/about'">
                Visit NLS Studios Community
            </button>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div id="banned-screen" class="screen">
            <h1 style="color: #ef4444;">🚫 BANNED</h1>
            <p>Access Denied.</p>
            <button class="logout-btn" onclick="handleLogout()">Return</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAjxklCo7h1l6UQwtLd-K7k4p_fe5SMh1k",
            authDomain: "nls-studio.firebaseapp.com",
            databaseURL: "https://nls-studio-default-rtdb.firebaseio.com", 
            projectId: "nls-studio",
            storageBucket: "nls-studio.firebasestorage.app",
            messagingSenderId: "711865717636",
            appId: "1:711865717636:web:a562ce05b48ea0e524c3d1",
            measurementId: "G-1PESXPE394"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let accounts = [];
        let currentUser = null;

        db.ref('accounts').on('value', (snapshot) => {
            accounts = snapshot.val() || [];
            if(!currentUser) {
                const savedUser = localStorage.getItem('nls_session');
                if(savedUser) {
                    const parsed = JSON.parse(savedUser);
                    const f = accounts.find(a => a.name === parsed.name && a.pass === parsed.pass);
                    if(f) {
                        if(f.status === "Banned") showScreen('banned-screen');
                        else { currentUser = f; showDashboard(); }
                    }
                }
            }
            if(currentUser) renderTable(); 
        });

        const dS = document.getElementById('birth-day');
        const yS = document.getElementById('birth-year');
        for(let i=1; i<=31; i++) dS.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=2026; i>=1950; i--) yS.innerHTML += `<option value="${i}">${i}</option>`;

        function handleSignUp() {
            const u = document.getElementById('reg-username').value;
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-password').value;
            if(!u || !e || !p) return alert("Fill all fields");
            if(accounts.some(a => a.name.toLowerCase() === u.toLowerCase())) return alert("Username Taken");
            
            const newUser = { name: u, pass: p, email: e, role: "user", status: "Active" };
            accounts.push(newUser);
            db.ref('accounts').set(accounts).then(() => { alert("Created!"); showScreen('login-screen'); });
        }

        function handleLogin() {
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            const f = accounts.find(a => a.name === u && a.pass === p);
            if (f) {
                if (f.status === "Banned") showScreen('banned-screen');
                else {
                    currentUser = f;
                    localStorage.setItem('nls_session', JSON.stringify(f));
                    showDashboard();
                }
            } else alert("Incorrect Login");
        }

        function handleLogout() {
            localStorage.removeItem('nls_session');
            location.reload();
        }

        function toggleRole(idx) {
            if(currentUser.role !== "owner") return;
            const roles = ["user", "tester", "admin", "developer"];
            let currentIdx = roles.indexOf(accounts[idx].role);
            let nextIdx = (currentIdx + 1) % roles.length;
            accounts[idx].role = roles[nextIdx];
            db.ref('accounts').set(accounts);
        }

        function toggleBan(idx) {
            accounts[idx].status = accounts[idx].status === "Active" ? "Banned" : "Active";
            db.ref('accounts').set(accounts);
        }

        function removeAccount(idx) {
            if(confirm("Delete account permanently?")) {
                accounts.splice(idx, 1);
                db.ref('accounts').set(accounts);
            }
        }

        function showDashboard() {
            showScreen('dashboard');
            const d = document.getElementById('user-display');
            const panel = document.getElementById('staff-panel');
            const ph = document.getElementById('pass-header');
            const hint = document.getElementById('panel-hint');
            const actionBtn = document.getElementById('main-action-btn');

            let role = currentUser.role || "user";
            let badgeColors = { owner: "owner-bg", developer: "dev-bg", admin: "admin-bg", tester: "tester-bg", user: "user-bg" };
            d.innerHTML = `@${currentUser.name} <span class="role-badge ${badgeColors[role]}">${role.toUpperCase()}</span>`;

            // UPDATE BUTTON TEXT BASED ON RANK
            if (role === "developer") {
                actionBtn.innerText = "Continue Developing";
            } else if (role === "tester") {
                actionBtn.innerText = "Continue Testing NLS Games";
            } else {
                actionBtn.innerText = "Visit NLS Studios Community";
            }

            // SHOW PANEL IF STAFF OR TESTER
            if (role === "owner" || role === "admin" || role === "developer" || role === "tester") {
                panel.style.display = "block";
                ph.style.display = role === "owner" ? "table-cell" : "none";
                hint.innerText = role === "owner" ? "Owner View: Cycle roles. Manage all." : 
                                 role === "developer" ? "Developer View: Manage Admins, Testers, Users." : 
                                 role === "admin" ? "Admin View: Manage Testers and Users." :
                                 "Tester View: Manage Users.";
            } else panel.style.display = "none";
            renderTable();
        }

        function renderTable() {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            const badgeColors = { owner: "owner-bg", developer: "dev-bg", admin: "admin-bg", tester: "tester-bg", user: "user-bg" };

            accounts.forEach((acc, index) => {
                const viewer = currentUser.role;
                let canSee = false;

                if (viewer === "owner") canSee = true;
                if (viewer === "developer" && (acc.role === "admin" || acc.role === "tester" || acc.role === "user")) canSee = true;
                if (viewer === "admin" && (acc.role === "tester" || acc.role === "user")) canSee = true;
                if (viewer === "tester" && acc.role === "user") canSee = true;

                if (canSee && acc.name !== currentUser.name) {
                    const isBanned = acc.status === "Banned";
                    const row = document.createElement('tr');
                    
                    let clickable = viewer === "owner" ? "badge-clickable" : "";
                    let clickAction = viewer === "owner" ? `onclick="toggleRole(${index})"` : "";

                    let content = `<td>${acc.name}</td>
                                   <td><span class="role-badge ${badgeColors[acc.role]} ${clickable}" ${clickAction}>${acc.role.toUpperCase()}</span></td>`;
                    if (viewer === "owner") content += `<td><span style="color:#fbbf24; font-family:monospace;">${acc.pass}</span></td>`;
                    content += `<td class="${isBanned ? 'status-banned' : 'status-active'}">${acc.status}</td>
                                <td class="action-cell">
                                    <button class="ban-btn" style="background:${isBanned ? '#4ade80' : '#ef4444'}" onclick="toggleBan(${index})">${isBanned ? 'Unban' : 'Ban'}</button>`;
                    if (viewer === "owner") content += `<button class="remove-btn" onclick="removeAccount(${index})">Remove</button>`;
                    content += `</td>`;
                    row.innerHTML = content;
                    list.appendChild(row);
                }
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }
    </script>
</body>
</html>
