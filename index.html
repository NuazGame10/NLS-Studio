<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLS Studio | Secure Cloud Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f172a; color: #f8fafc; overflow: hidden; }
        .container { background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); width: 100%; max-width: 750px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; margin-bottom: 8px; outline: none; }
        
        .forgot-link { display: block; text-align: right; font-size: 0.75rem; color: #94a3b8; text-decoration: none; margin-bottom: 20px; transition: 0.3s; }
        .forgot-link:hover { color: #38bdf8; text-decoration: underline; }
        
        button.btn-signin { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 25px; }
        button.btn-signin:hover { background: #7dd3fc; transform: translateY(-2px); }
        
        .signup-bottom { display: flex; justify-content: center; align-items: center; gap: 10px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.85rem; color: #94a3b8; }
        .btn-signup-small { background: #38bdf8; color: #0f172a; padding: 4px 12px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.75rem; transition: 0.3s; border: none; cursor: pointer; }
        
        .screen { display: none; }
        .active-screen { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th { color: #94a3b8; font-size: 0.75rem; padding: 10px; border-bottom: 1px solid #334155; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        
        .ban-btn { padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.7rem; color: white; font-weight: bold; width: auto; }
        .status-active { color: #4ade80; }
        .status-banned { color: #ef4444; text-decoration: line-through; }
        .role-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-left: 5px; }
        .owner-bg { background: #38bdf8; color: #0f172a; }
        
        .community-btn { background: #ffffff; color: #000000; margin: 20px auto 0; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; max-width: 350px; font-size: 0.9rem; border-radius: 8px; font-weight: bold; padding: 10px; }
        .pass-text { font-family: monospace; color: #fbbf24; background: rgba(251, 191, 36, 0.1); padding: 2px 5px; border-radius: 4px; }
        .logout-btn { background: transparent; color: #94a3b8; text-decoration: underline; margin-top: 15px; font-size: 0.8rem; cursor: pointer; border: none; width: auto; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen" class="screen active-screen">
            <h2 style="margin-bottom: 25px; letter-spacing: 2px;">NLS STUDIO</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <a href="https://forms.gle/LXj5qCpgW8e6RVTF7" class="forgot-link">Forgot Your Password?</a>
            <button class="btn-signin" onclick="handleLogin()">Sign In</button>
            <div class="signup-bottom">
                <span>Don't have an account?</span>
                <button class="btn-signup-small" onclick="window.location.href='https://forms.gle/L2LuYDM4wR8Xgfn98'">Sign Up</button>
            </div>
        </div>

        <div id="dashboard" class="screen">
            <h2 id="welcome-msg">Welcome!</h2>
            <p id="user-display" style="margin-top: 5px;"></p>
            <div style="background: #1e293b; padding: 15px; border-radius: 12px; margin-top: 20px; overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>User</th><th>Role</th><th id="pass-header" style="display:none;">Password</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody id="user-list"></tbody>
                </table>
            </div>
            <button class="community-btn" onclick="window.location.href='https://www.roblox.com/communities/34495526/NLS-Studios#!/about'">Visit Community</button>
            <button class="logout-btn" onclick="location.reload()">Logout</button>
        </div>

        <div id="banned-screen" class="screen">
            <h1 style="color: #ef4444; font-size: 3rem;">🚫</h1>
            <h2 style="color: #ef4444;">ACCESS DENIED</h2>
            <p style="margin: 15px 0; color: #94a3b8;">This account has been banned by the Owner.</p>
            <button class="logout-btn" onclick="location.reload()">Return to Login</button>
        </div>
    </div>

    <script>
        // All your info is now plugged in correctly!
        const firebaseConfig = {
            apiKey: "AIzaSyAjxklCo7h1l6UQwtLd-K7k4p_fe5SMh1k",
            authDomain: "nls-studio.firebaseapp.com",
            databaseURL: "https://nls-studio-default-rtdb.firebaseio.com", 
            projectId: "nls-studio",
            storageBucket: "nls-studio.firebasestorage.app",
            messagingSenderId: "711865717636",
            appId: "1:711865717636:web:a562ce05b48ea0e524c3d1",
            measurementId: "G-1PESXPE394"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let accounts = [];
        let currentUser = null;

        // Auto-load data from Cloud
        db.ref('accounts').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                accounts = data;
            } else {
                // Initial data if cloud is empty
                accounts = [
                    { name: "BookOfCuteBunny", pass: "Syafa", role: "admin", status: "Active" },
                    { name: "Guest", pass: "10", role: "user", status: "Active" }
                ];
                db.ref('accounts').set(accounts);
            }
            if(currentUser) renderTable(); 
        });

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if (u === "NuazGamespot10" && p === "Malaysia1957") {
                currentUser = { name: u, role: "owner" };
                showDashboard();
            } else {
                const found = accounts.find(a => a.name === u && a.pass === p);
                if (found) {
                    if (found.status === "Banned") {
                        showScreen('banned-screen');
                    } else {
                        currentUser = found;
                        showDashboard();
                    }
                } else {
                    alert("Incorrect Login Details");
                }
            }
        }

        function toggleBan(idx) {
            accounts[idx].status = accounts[idx].status === "Active" ? "Banned" : "Active";
            db.ref('accounts').set(accounts); // This saves the ban permanently to the cloud
        }

        function showDashboard() {
            showScreen('dashboard');
            const welcome = document.getElementById('welcome-msg');
            const display = document.getElementById('user-display');
            const passHeader = document.getElementById('pass-header');

            if (currentUser.role === "owner") {
                welcome.innerText = "Welcome Back Owner!";
                display.innerHTML = `@${currentUser.name} <span class="role-badge owner-bg">OWNER</span>`;
                passHeader.style.display = "table-cell";
            } else {
                welcome.innerText = "Welcome!";
                display.innerHTML = `@${currentUser.name}`;
                passHeader.style.display = "none";
            }
            renderTable();
        }

        function renderTable() {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            accounts.forEach((acc, index) => {
                if (currentUser.role !== "owner" && acc.name !== currentUser.name) return;
                
                const isBanned = acc.status === "Banned";
                const row = document.createElement('tr');
                let rowContent = `<td>${acc.name}</td><td>${acc.role}</td>`;
                if (currentUser.role === "owner") rowContent += `<td><span class="pass-text">${acc.pass}</span></td>`;
                rowContent += `<td class="${isBanned ? 'status-banned' : 'status-active'}">${acc.status}</td>`;
                
                if (currentUser.role === "owner") {
                    rowContent += `<td><button class="ban-btn" style="background:${isBanned ? '#4ade80' : '#ef4444'}" onclick="toggleBan(${index})">${isBanned ? 'Unban' : 'Ban'}</button></td>`;
                } else {
                    rowContent += `<td>-</td>`;
                }
                
                row.innerHTML = rowContent;
                list.appendChild(row);
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }
    </script>
</body>
</html>
