<script>
    // MAKE SURE TO PUT YOUR ACTUAL KEY AND URL HERE
    const firebaseConfig = {
        apiKey: "AIzaSyAjxklCo7h1l6UQwtLd-K7k4p_fe5SMh1k",
        authDomain: "nls-studio.firebaseapp.com",
        databaseURL: "https://nls-studio-default-rtdb.firebaseio.com", 
        projectId: "nls-studio"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let accounts = [];
    let currentUser = null;
    let selectedUserIdx = null;

    db.ref('accounts').on('value', (snapshot) => {
        accounts = snapshot.val() || [];
        const session = localStorage.getItem('nls_session');
        
        if(session) {
            const parsed = JSON.parse(session);
            const freshData = accounts.find(a => a.name === parsed.name);
            
            if(freshData) {
                const now = Date.now();
                // FIX: Check for both old 'Banned' status and new 'banData'
                const isBanned = freshData.status === "Banned" || (freshData.banData && (freshData.banData.expiry === -1 || freshData.banData.expiry > now));
                
                if(isBanned) {
                    // If they have old status but no banData, give a default reason
                    const reason = freshData.banData ? freshData.banData.reason : "Account disabled by staff.";
                    const expiry = freshData.banData ? freshData.banData.expiry : -1;
                    showBanScreen({ reason, expiry });
                    return;
                }
                
                currentUser = freshData;
                showDashboard();
            }
        }
        renderTable(); // Always attempt to render the table if staff
    });

    function renderTable() {
        if (!currentUser) return;
        const list = document.getElementById('user-list');
        if (!list) return;

        list.innerHTML = "";
        const badgeColors = { owner: "owner-bg", developer: "dev-bg", admin: "admin-bg", tester: "tester-bg", user: "user-bg" };

        accounts.forEach((acc, index) => {
            const viewer = currentUser.role;
            let canManage = false;

            // Permission check
            if (viewer === "owner") canManage = true;
            else if (viewer === "developer" && ["admin", "tester", "user"].includes(acc.role)) canManage = true;
            else if (viewer === "admin" && ["tester", "user"].includes(acc.role)) canManage = true;
            else if (viewer === "tester" && acc.role === "user") canManage = true;

            // Don't show yourself in the list
            if (canManage && acc.name !== currentUser.name) {
                const now = Date.now();
                // FIX: Better check for 'isBanned'
                const isBanned = acc.status === "Banned" || (acc.banData && (acc.banData.expiry === -1 || acc.banData.expiry > now));
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${acc.name}</td>
                    <td><span class="role-badge ${badgeColors[acc.role] || 'user-bg'}">${acc.role.toUpperCase()}</span></td>
                    <td class="${isBanned ? 'status-banned' : 'status-active'}">${isBanned ? 'Banned' : 'Active'}</td>
                    <td>
                        ${isBanned ? 
                            `<button class="unban-btn" onclick="unbanUser(${index})">Unban</button>` : 
                            `<button class="ban-btn" onclick="openBanModal(${index})">Ban</button>`}
                    </td>
                `;
                list.appendChild(row);
            }
        });
    }
    
    // ... rest of the functions (openBanModal, submitBan, etc.) from previous code
</script>
