<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLS Studio | Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f172a; color: #f8fafc; overflow: hidden; }
        .container { background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); width: 100%; max-width: 800px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; position: relative; }
        
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; margin-bottom: 12px; outline: none; }
        
        .btn-primary { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-secondary { background: transparent; color: #38bdf8; border: 1px solid #38bdf8; margin-top: 10px; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .birthday-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .birthday-row select { margin-bottom: 0; }

        .screen { display: none; }
        .active-screen { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #ban-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 25px; border-radius: 12px; border: 2px solid #ef4444; width: 90%; z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,0.8); }

        #staff-panel { background: #1e293b; padding: 15px; border-radius: 12px; margin-top: 10px; overflow-x: auto; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .minimize-btn { background: #334155; color: #f8fafc; border: none; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: #94a3b8; font-size: 0.75rem; padding: 10px; border-bottom: 1px solid #334155; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        
        .role-badge { padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .badge-clickable { cursor: pointer; }
        .owner-bg { background: #38bdf8; color: #0f172a; }
        .dev-bg { background: #0ea5e9; color: white; }
        .admin-bg { background: #a855f7; color: white; }
        .tester-bg { background: #10b981; color: white; }
        .user-bg { background: #64748b; color: white; }
        
        .action-cell { display: flex; gap: 5px; }
        .ban-btn { padding: 5px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.7rem; color: white; font-weight: bold; }
        .remove-btn { padding: 5px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.7rem; color: white; font-weight: bold; background: #475569; }

        .community-btn { background: #ffffff; color: #000000; margin: 25px auto 0; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; max-width: 350px; font-size: 0.9rem; border-radius: 8px; font-weight: bold; padding: 12px; border: none; cursor: pointer; }
        .logout-btn { background: transparent; color: #94a3b8; text-decoration: underline; margin-top: 15px; font-size: 0.8rem; cursor: pointer; border: none; }
        .ban-box { background: rgba(239, 68, 68, 0.1); padding: 15px; border-radius: 8px; border-left: 4px solid #ef4444; text-align: left; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="ban-modal">
            <h3 style="color: #ef4444; margin-bottom: 15px;">Moderate Account</h3>
            <p id="ban-target-name" style="margin-bottom: 10px; font-weight: bold;"></p>
            <textarea id="ban-reason" placeholder="Reason..."></textarea>
            <select id="ban-duration">
                <option value="1">1 Minute</option>
                <option value="60">1 Hour</option>
                <option value="1440">1 Day</option>
                <option value="-1">Forever</option>
            </select>
            <button class="btn-primary" style="background: #ef4444; color: white;" onclick="submitBan()">BAN PLAYER</button>
            <button class="logout-btn" onclick="closeBanModal()">Cancel</button>
        </div>

        <div id="login-screen" class="screen active-screen">
            <h2>NLS STUDIO</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button class="btn-primary" onclick="handleLogin()">Sign In</button>
            <button class="btn-secondary" onclick="showScreen('signup-screen')">Create New Account</button>
        </div>

        <div id="signup-screen" class="screen">
            <h2>NLS Account Sign Up</h2>
            <div class="birthday-row">
                <select id="birth-day"></select>
                <select id="birth-month">
                    <option value="Jan">Jan</option><option value="Feb">Feb</option><option value="Mar">Mar</option>
                    <option value="Apr">Apr</option><option value="May">May</option><option value="Jun">Jun</option>
                    <option value="Jul">Jul</option><option value="Aug">Aug</option><option value="Sep">Sep</option>
                    <option value="Oct">Oct</option><option value="Nov">Nov</option><option value="Dec">Dec</option>
                </select>
                <select id="birth-year"></select>
            </div>
            <input type="text" id="reg-username" placeholder="Username">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Password">
            <button class="btn-primary" onclick="handleSignUp()">Sign Up</button>
            <button class="logout-btn" onclick="showScreen('login-screen')">Back to Login</button>
        </div>

        <div id="dashboard" class="screen">
            <h2 id="welcome-msg">Welcome</h2>
            <p id="user-display" style="margin-bottom: 20px;"></p>
            
            <div id="panel-container" style="display:none;">
                <div class="panel-header">
                    <p style="font-size: 0.7rem; color: #94a3b8;" id="panel-hint"></p>
                    <button class="minimize-btn" id="toggle-panel-btn" onclick="togglePanelVisibility()">Minimize Panel</button>
                </div>
                <div id="staff-panel">
                    <table>
                        <thead>
                            <tr><th>User</th><th>Rank</th><th id="pass-header" style="display:none;">Pass</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="user-list"></tbody>
                    </table>
                </div>
            </div>

            <button id="main-action-btn" class="community-btn" onclick="window.location.href='https://www.roblox.com/communities/34495526/NLS-Studios#!/about'">
                Visit NLS Studios Community
            </button>
            <button class="logout-btn" onclick="handleLogout()">Log Out</button>
        </div>

        <div id="banned-screen" class="screen">
            <h1 style="color: #ef4444;">🚫 BANNED</h1>
            <p style="margin-top: 10px; font-weight: bold; color: #94a3b8;">Your account has been temporarily banned because of a violation you committed in NLS Studio.</p>
            <div class="ban-box">
                <p><strong>Reason:</strong> <span id="display-ban-reason"></span></p>
                <p style="margin-top: 10px;"><strong>Expires:</strong> <span id="display-ban-time"></span></p>
            </div>
            <button class="btn-primary" onclick="handleLogout()">Log Out</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAjxklCo7h1l6UQwtLd-K7k4p_fe5SMh1k",
            authDomain: "nls-studio.firebaseapp.com",
            databaseURL: "https://nls-studio-default-rtdb.firebaseio.com", 
            projectId: "nls-studio"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let accounts = [];
        let currentUser = null;
        let selectedUserIdx = null;

        const dS = document.getElementById('birth-day');
        const yS = document.getElementById('birth-year');
        for(let i=1; i<=31; i++) dS.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=2026; i>=1950; i--) yS.innerHTML += `<option value="${i}">${i}</option>`;

        // THE AUTO-UNBAN TICKER (Checks every 1 second)
        setInterval(() => {
            if (!currentUser) return;
            const now = Date.now();
            const isBanned = currentUser.status === "Banned" || (currentUser.banData && (currentUser.banData.expiry === -1 || currentUser.banData.expiry > now));
            
            const onBanScreen = document.getElementById('banned-screen').classList.contains('active-screen');
            
            // Auto switch if ban expires while looking at the screen
            if (!isBanned && onBanScreen) {
                showDashboard();
            }
        }, 1000);

        db.ref('accounts').on('value', (snapshot) => {
            accounts = snapshot.val() || [];
            const session = localStorage.getItem('nls_session');
            
            if(session) {
                const parsed = JSON.parse(session);
                const freshData = accounts.find(a => a.name === parsed.name);
                
                if(freshData) {
                    currentUser = freshData;
                    const now = Date.now();
                    const isBanned = freshData.status === "Banned" || (freshData.banData && (freshData.banData.expiry === -1 || freshData.banData.expiry > now));

                    if(isBanned) {
                        showBanUI(freshData.banData?.reason || "Violation.", freshData.banData?.expiry || -1);
                    } else {
                        showDashboard();
                    }
                }
            }
            if(currentUser) renderTable(); 
        });

        function handleSignUp() {
            const u = document.getElementById('reg-username').value;
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-password').value;
            if(!u || !e || !p) return alert("Fill all fields");
            if(accounts.some(a => a.name.toLowerCase() === u.toLowerCase())) return alert("Username Taken");
            accounts.push({ name: u, pass: p, email: e, role: "user", status: "Active" });
            db.ref('accounts').set(accounts).then(() => { alert("Created!"); showScreen('login-screen'); });
        }

        function handleLogin() {
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            const f = accounts.find(a => a.name === u && a.pass === p);
            if (f) {
                currentUser = f;
                localStorage.setItem('nls_session', JSON.stringify(f));
                // The DB listener above will handle showing the correct screen
            } else alert("Incorrect Login");
        }

        function showDashboard() {
            showScreen('dashboard');
            const d = document.getElementById('user-display');
            const container = document.getElementById('panel-container');
            const actionBtn = document.getElementById('main-action-btn');
            const role = currentUser.role || "user";
            const colors = { owner: "owner-bg", developer: "dev-bg", admin: "admin-bg", tester: "tester-bg", user: "user-bg" };
            
            d.innerHTML = `@${currentUser.name} <span class="role-badge ${colors[role]}">${role.toUpperCase()}</span>`;
            
            if (role === "developer") actionBtn.innerText = "Continue Developing";
            else if (role === "tester") actionBtn.innerText = "Continue Testing NLS Games";
            else actionBtn.innerText = "Visit NLS Studios Community";

            if (["owner", "admin", "developer", "tester"].includes(role)) {
                container.style.display = "block";
                document.getElementById('pass-header').style.display = role === "owner" ? "table-cell" : "none";
                document.getElementById('panel-hint').innerText = `${role.toUpperCase()} VIEW`;
            } else {
                container.style.display = "none";
            }
            renderTable();
        }

        function renderTable() {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            const colors = { owner: "owner-bg", developer: "dev-bg", admin: "admin-bg", tester: "tester-bg", user: "user-bg" };

            accounts.forEach((acc, index) => {
                const viewer = currentUser.role;
                let canSee = false;
                if (viewer === "owner") canSee = true;
                else if (viewer === "developer" && ["admin", "tester", "user"].includes(acc.role)) canSee = true;
                else if (viewer === "admin" && ["tester", "user"].includes(acc.role)) canSee = true;
                else if (viewer === "tester" && acc.role === "user") canSee = true;

                if (canSee && acc.name !== currentUser.name) {
                    const isBanned = acc.status === "Banned" || (acc.banData && (acc.banData.expiry === -1 || acc.banData.expiry > Date.now()));
                    const row = document.createElement('tr');
                    let clickable = viewer === "owner" ? "badge-clickable" : "";
                    
                    let content = `<td>${acc.name}</td>
                        <td><span class="role-badge ${colors[acc.role]} ${clickable}" onclick="${viewer === 'owner' ? `toggleRole(${index})` : ''}">${acc.role.toUpperCase()}</span></td>`;
                    
                    if (viewer === "owner") content += `<td style="color:#fbbf24">${acc.pass}</td>`;
                    
                    content += `<td style="color:${isBanned ? '#ef4444' : '#4ade80'}">${isBanned ? 'Banned' : 'Active'}</td>
                        <td class="action-cell">
                            <button class="ban-btn" style="background:${isBanned ? '#4ade80' : '#ef4444'}" onclick="${isBanned ? `unbanUser(${index})` : `openBanModal(${index})`}">${isBanned ? 'Unban' : 'Ban'}</button>`;
                    
                    if (viewer === "owner") content += `<button class="remove-btn" onclick="removeAccount(${index})">Remove</button>`;
                    
                    row.innerHTML = content + `</td>`;
                    list.appendChild(row);
                }
            });
        }

        function togglePanelVisibility() {
            const panel = document.getElementById('staff-panel');
            const btn = document.getElementById('toggle-panel-btn');
            panel.style.display = panel.style.display === "none" ? "block" : "none";
            btn.innerText = panel.style.display === "none" ? "View Staff Panel" : "Minimize Panel";
        }

        function toggleRole(idx) {
            const roles = ["user", "tester", "admin", "developer"];
            let nextIdx = (roles.indexOf(accounts[idx].role) + 1) % roles.length;
            accounts[idx].role = roles[nextIdx];
            db.ref('accounts').set(accounts);
        }

        function openBanModal(idx) {
            selectedUserIdx = idx;
            document.getElementById('ban-target-name').innerText = "Banning: " + accounts[idx].name;
            document.getElementById('ban-modal').style.display = "block";
        }

        function closeBanModal() { document.getElementById('ban-modal').style.display = "none"; }

        function submitBan() {
            const reason = document.getElementById('ban-reason').value || "Violation of rules.";
            const time = parseInt(document.getElementById('ban-duration').value);
            const expiry = (time === -1) ? -1 : Date.now() + (time * 60000);
            accounts[selectedUserIdx].status = "Banned";
            accounts[selectedUserIdx].banData = { reason, expiry };
            db.ref('accounts').set(accounts).then(() => closeBanModal());
        }

        function unbanUser(idx) {
            accounts[idx].status = "Active";
            accounts[idx].banData = null;
            db.ref('accounts').set(accounts);
        }

        function removeAccount(idx) {
            if(confirm("Delete account permanently?")) {
                accounts.splice(idx, 1);
                db.ref('accounts').set(accounts);
            }
        }

        function showBanUI(r, e) {
            showScreen('banned-screen');
            document.getElementById('display-ban-reason').innerText = r;
            document.getElementById('display-ban-time').innerText = (e === -1) ? "Forever" : new Date(e).toLocaleString();
        }

        function handleLogout() {
            localStorage.removeItem('nls_session');
            location.reload();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }
    </script>
</body>
</html>
